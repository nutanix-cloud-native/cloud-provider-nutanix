{{- if eq .Values.createConfig true }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ .Values.configName}}
  namespace: {{ .Release.Namespace }}
data:
  nutanix_config.json: |-
    {
      "prismCentral": {
        "address": {{ .Values.prismCentralEndPoint | toJson }},
        "port": {{ .Values.prismCentralPort }},
        "insecure": {{ .Values.prismCentralInsecure }},
        "credentialRef": {
          "kind": "secret",
          "name": {{ .Values.secretName | toJson }},
          "namespace": {{ .Release.Namespace | toJson }}
        },
        "additionalTrustBundle": {
          "kind": "ConfigMap",
          "name": "user-ca-bundle",
          "namespace": {{ .Release.Namespace | toJson }}
        }

      },
      "enableCustomLabeling": {{ .Values.enableCustomLabeling }},
{{- with .Values.ignoredNodeIPs }}
      "ignoredNodeIPs": [ {{ range $idx, $ip := . }}{{ if $idx }}, {{ end }}{{ $ip | toJson }}{{ end }} ],
{{- end }}

{{- if eq .Values.topologyDiscovery.type "Categories" }}
      "topologyDiscovery": {
        "type": "Categories",
        "topologyCategories": {
          "regionCategory": {{ .Values.topologyCategories.region | toJson }},
          "zoneCategory": {{ .Values.topologyCategories.zone | toJson }}
        }
{{- else }}
      "topologyDiscovery": {
        "type": "Prism"
{{- end }}
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-ca-bundle
  namespace: {{ .Release.Namespace }}
binaryData:
  ca.crt: {{ .Values.prismCentralAdditionalTrustBundle }}
{{- end }}

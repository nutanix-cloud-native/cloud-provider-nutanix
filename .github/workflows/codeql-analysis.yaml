name: "Code Scanning - Action"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
  schedule:
    - cron: "30 1 * * 0"

jobs:
  check_approvals:
    runs-on:
      - self-hosted-nutanix-docker-small
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
    outputs:
      check_approvals: ${{ github.event_name == 'pull_request_target' && steps.check_approvals.outputs.check_approvals || 'true' }}
      external_pr: ${{ github.event.pull_request.base.repo.clone_url != github.event.pull_request.head.repo.clone_url }}
    steps:
      # Only require approval for external (fork) PRs. Internal PRs still
      # trigger pull_request_target but must not fail this check, so scope the
      # approval gate to cross-repo PRs (matching the external_pr logic below).
      - name: Check approval status
        if: ${{ github.event_name == 'pull_request_target' &&
          github.event.pull_request.base.repo.clone_url != github.event.pull_request.head.repo.clone_url }}
        id: check_approvals
        uses: nutanix-cloud-native/action-check-approvals@v1

  CodeQL-Build:
    if: ${{ always() &&
      (github.event_name == 'push' || github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && needs.check_approvals.outputs.external_pr == 'false') ||
      (github.event_name == 'pull_request_target' && needs.check_approvals.outputs.external_pr == 'true' && needs.check_approvals.outputs.check_approvals == 'true')) }}
    needs: check_approvals
    runs-on:
      - self-hosted-nutanix-docker-small

    permissions:
      # required for all workflows
      security-events: write

      # only required for workflows in private repositories
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # External PRs run via pull_request_target and are gated behind
          # maintainer approval (check_approvals job), so opting in to fork
          # checkout here is safe.
          allow-unsafe-pr-checkout: true

      # Self-hosted runners do not ship Go; CodeQL autobuild needs it on PATH.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        # Override language selection by uncommenting this and choosing your languages
        # with:
        #   languages: go, javascript, csharp, python, cpp, java

      # Autobuild attempts to build any compiled languages (C/C++, C#, or Java).
      # If this step fails, then you should remove it and run the build manually (see below).
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # ℹ️ Command-line programs to run using the OS shell.
      # 📚 https://git.io/JvXDl

      # ✏️ If the Autobuild fails above, remove it and uncomment the following
      #    three lines and modify them (or add more) to build your code if your
      #    project uses a compiled language

      #- run: |
      #     make bootstrap
      #     make release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

name: Generate release artefact

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build_release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devbox
        run: curl -fsSL https://get.jetpack.io/devbox | bash -s -- -f

      - name: Install devbox deps
        run: devbox install

      - name: Install tools
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          source: "github"
          ko: "latest"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ccm-nutanix
          sep-tags: ","
          sep-labels: ","
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=sha

      - name: Build container
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}/controller
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
          PLATFORMS: linux/amd64
        run: |
          PTAGS=`echo $TAGS | sed 's/ccm-nutanix://g'`
          export SOURCE_DATE_EPOCH=$(date +%s)
          devbox run -- ko build --bare --image-label "$LABELS" -t "$PTAGS" --platform=$PLATFORMS .

      - name: Generate image info
        env:
          NEW_IMG: ghcr.io/${{ github.repository }}/controller:${{ steps.meta.outputs.version }}
        run: |
          echo "## Images" >> ${{ github.workspace }}-CHANGELOG.txt
          echo "|Name|Link|" >> ${{ github.workspace }}-CHANGELOG.txt
          echo "|-|-|" >> ${{ github.workspace }}-CHANGELOG.txt
          echo "|Nutanix Cloud Provider|[$NEW_IMG]($NEW_IMG)|" >> ${{ github.workspace }}-CHANGELOG.txt

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # chart-testing/yamale is currently incompatible with Python 3.14
          python-version: "3.13"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Lint chart
        run: |
          ct lint --charts charts/nutanix-cloud-provider \
            --check-version-increment=false \
            --validate-maintainers=false

      - name: Package and push Helm chart to GHCR
        env:
          CHART_DIR: charts/nutanix-cloud-provider
          # Destination OCI repo. Override with the HELM_OCI_REPO repo/org
          # variable (e.g. in the internal fork) to avoid clobbering the chart
          # published from this repo; defaults to the canonical path.
          HELM_OCI_REPO: ${{ vars.HELM_OCI_REPO || 'ghcr.io/nutanix-cloud-native/chart' }}
        run: |
          # Chart version tracks the CCM release tag (semver, no leading "v");
          # appVersion keeps the "v" prefix so it matches the published image tag.
          VERSION="${GITHUB_REF_NAME#v}"
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
          helm package "$CHART_DIR" \
            --version "$VERSION" \
            --app-version "$GITHUB_REF_NAME" \
            --destination .cr-release-packages
          helm push .cr-release-packages/*.tgz "oci://${HELM_OCI_REPO}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body_path: ${{ github.workspace }}-CHANGELOG.txt
          generate_release_notes: true
          append_body: true

name: Black Duck Policy Check
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
      - 'release-*'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '.github/**'
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - '.github/**'
jobs:
  check_approvals:
    runs-on:
      - self-hosted-nutanix-docker-small
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
    outputs:
      check_approvals: ${{ github.event_name == 'pull_request_target' && steps.check_approvals.outputs.check_approvals || 'true' }}
      external_pr: ${{ github.event.pull_request.base.repo.clone_url != github.event.pull_request.head.repo.clone_url }}
    steps:
      - name: Check approval status
        if: ${{ github.event_name == 'pull_request_target' }}
        id: check_approvals
        uses: nutanix-cloud-native/action-check-approvals@v1

  security:
    if: ${{ always() && github.repository == 'nutanix-cloud-native/cloud-provider-nutanix' &&
      (github.event_name == 'push' || github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && needs.check_approvals.outputs.external_pr == 'false') ||
      (github.event_name == 'pull_request_target' && needs.check_approvals.outputs.external_pr == 'true' && needs.check_approvals.outputs.check_approvals == 'true')) }}
    needs: check_approvals
    runs-on:
      - self-hosted-nutanix-docker-small
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # External PRs (non-.github changes) run via pull_request_target and
          # are gated behind maintainer approval (check_approvals job), so
          # opting in to fork checkout here is safe.
          allow-unsafe-pr-checkout: true

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: false

      - name: Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build Project
        run: devbox run -- make build

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "adopt"

      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Black Duck Full Scan
        if: ${{ github.event_name == 'push' || github.event_name == 'schedule' }}
        uses: blackduck-inc/black-duck-security-scan@v2.1.1
        with:
          blackducksca_url: ${{ secrets.BLACKDUCK_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          blackducksca_scan_full: true
          blackducksca_scan_failure_severities: 'BLOCKER,CRITICAL'

      - name: Black Duck PR Scan
        if: ${{ github.event_name == 'pull_request' || github.event_name == 'pull_request_target' }}
        uses: blackduck-inc/black-duck-security-scan@v2.1.1
        env:
          DETECT_PROJECT_VERSION_NAME: ${{ github.base_ref }}
        with:
          blackducksca_url: ${{ secrets.BLACKDUCK_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          blackducksca_scan_full: false
          blackducksca_prComment_enabled: true
